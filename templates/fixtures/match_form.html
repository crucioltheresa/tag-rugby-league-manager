{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">

        <h2 class="fw-bold text-uppercase mb-1">Edit Match</h2>
        <p class="text-muted mb-1">{{ match.team_a.name }} vs {{ match.team_b.name }} — Round {{ match.round_number }}</p>
        <div class="border-bottom border-success border-3 mb-4 w-25"></div>

        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4">
                <form method="post" class="trlm-form">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ form.date.label }}</label>
                        {{ form.date }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ form.time.label }}</label>
                        {{ form.time }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">{{ form.pitch.label }}</label>
                        {{ form.pitch }}
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger">{{ form.errors }}</div>
                    {% endif %}

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'fixture_list' season_id=match.season_id %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-trlm-navy px-4">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
