{% extends "base.html" %}

{% block content %}

<div class="d-flex align-items-center justify-content-between mb-1 flex-wrap gap-2">
    <h2 class="fw-bold text-uppercase mb-0">{{ season.name }}</h2>
    <span class="badge fs-6 bg-{% if season.status == 'active' %}success{% elif season.status == 'finished' %}danger{% else %}secondary{% endif %}">
        {{ season.get_status_display }}
    </span>
</div>
<div class="border-bottom border-success border-3 mb-4 w-25"></div>

<div class="card shadow-sm border-0 mb-4">
    <div class="card-body p-4">
        <div class="row g-3">
            <div class="col-md-6">
                <p class="text-muted small text-uppercase fw-semibold mb-1">Start Date</p>
                <p class="fw-bold">{{ season.start_date }}</p>
            </div>
            <div class="col-md-6">
                <p class="text-muted small text-uppercase fw-semibold mb-1">End Date</p>
                <p class="fw-bold">{{ season.end_date }}</p>
            </div>
        </div>
    </div>
</div>

<div class="d-flex flex-wrap gap-2">
    <a href="{% url 'season_edit' season.pk %}" class="btn btn-trlm-navy">
        <i class="fas fa-edit me-1"></i>Edit
    </a>
    <a href="{% url 'delete_season' season.pk %}" class="btn btn-danger">
        <i class="fas fa-trash me-1"></i>Delete
    </a>
    <a href="#" class="btn btn-outline-secondary">
        <i class="fas fa-random me-1"></i>Generate Fixtures
    </a>
    <a href="{% url 'seasons' %}" class="btn btn-outline-secondary ms-auto">
        <i class="fas fa-arrow-left me-1"></i>Back to Seasons
    </a>
</div>

{% endblock %}
