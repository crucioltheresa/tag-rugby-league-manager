{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">

        <h2 class="fw-bold text-uppercase mb-1">Logout</h2>
        <div class="border-bottom border-success border-3 mb-4 w-25"></div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">
                <p class="text-muted mb-4">Are you sure you want to log out?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="/" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-trlm-pink">Logout</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
